[changelog]
header = """# Journal des modifications

Toutes les modifications notables de ce projet sont documentées dans ce fichier.
Le format est basé sur [Keep a Changelog](https://keepachangelog.com/fr/1.0.0/).

"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Non publié] - {{ now() | date(format="%Y-%m-%d") }}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}** : {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_parsers = [
  { message = "^feat", group = "Ajouté" },
  { message = "^fix", group = "Corrigé" },
  { message = "^refactor", group = "Modifié" },
  { message = "^style", group = "Modifié" },
  { message = "^perf", group = "Modifié" },
  { message = "^chore", group = "Maintenance" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "Intégration continue" },
  { message = "^revert", group = "Annulations" },
  { message = "\\[skip ci\\]", skip = true },
  { message = "^Merge", skip = true },
  { message = ".*", group = "Divers" },
]

filter_commits = false
topo_order = false
sort_commits = "newest"
