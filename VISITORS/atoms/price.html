<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom — Price | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>
  <p class="demo-label">Taille small (cards liste)</p>
  <div class="group">
    <span class="price price--sm" aria-label="450 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">450</span>
    </span>
    <span class="price price--sm" aria-label="1 200 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">1 200</span>
    </span>
  </div>

  <p class="demo-label">Taille medium (cards catalogue)</p>
  <div class="group">
    <span class="price price--md" aria-label="850 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">850</span>
    </span>
    <span class="price price--md" aria-label="2 400 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">2 400</span>
    </span>
  </div>

  <p class="demo-label">Taille large (fiche produit)</p>
  <div class="group">
    <span class="price price--lg" aria-label="1 800 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">1 800</span>
    </span>
    <span class="price price--lg price--struck" aria-label="Ancien prix : 2 200 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">2 200</span>
    </span>
  </div>

  <p class="demo-label">Sur fond sombre</p>
  <div class="demo-dark">
    <span class="price price--hero price--white" aria-label="3 500 euros">
      <span class="price__currency" aria-hidden="true">€</span>
      <span class="price__amount">3 500</span>
    </span>
  </div>
</body>
</html>
