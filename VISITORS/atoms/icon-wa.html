  <style>
    body { padding: var(--sp-8); background: var(--c-cream); }
    .demo-label { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
      letter-spacing: var(--tracking-wider); color: var(--n-55); margin-bottom: var(--sp-4);
      margin-top: var(--sp-8); }
    .group { display: flex; flex-wrap: wrap; gap: var(--sp-4); align-items: center; }
    .demo-dark { background: var(--c-black); padding: var(--sp-6); border-radius: var(--r-xl);
      margin-top: var(--sp-4); display: flex; gap: var(--sp-4); align-items: center; }

    /* ── ICON WHATSAPP ATOM ─────────────────────────────────────────────── */
    .icon-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--c-wa);
      flex-shrink: 0;
    }
    .icon-wa svg { display: block; }
    .icon-wa--24 svg  { width: 24px;  height: 24px; }
    .icon-wa--32 svg  { width: 32px;  height: 32px; }
    .icon-wa--48 svg  { width: 48px;  height: 48px; }
    .icon-wa--64 svg  { width: 64px;  height: 64px; }

    /* Cercle fond vert */
    .icon-wa--circle {
      background: var(--c-wa);
      color: var(--c-white);
      border-radius: var(--r-full);
      padding: 6px;
    }
  </style>
