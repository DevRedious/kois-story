<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom  Logo | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>
  <p class="demo-label">Variante header  fond sombre</p>
  <div class="demo-section demo-dark">
    <a href="home.html" class="logo logo--header">
      <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story  Élevage de koïs Konishi">
    </a>
  </div>

  <p class="demo-label">Variante footer  fond noir</p>
  <div class="demo-section demo-dark">
    <a href="home.html" class="logo logo--footer">
      <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story  élevage de carpes koïs Konishi">
    </a>
  </div>

  <p class="demo-label">Variante fond crème</p>
  <div class="demo-section demo-light">
    <a href="home.html" class="logo logo--header">
      <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story  élevage de carpes koïs Konishi">
    </a>
  </div>

  <p class="demo-label">Variante site-logo  logo indépendant (nouvelle navbar pill)</p>
  <div class="demo-section demo-dark">
    <a href="home.html" class="site-logo">
      <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story  élevage de carpes koïs Konishi">
    </a>
  </div>

  <p class="demo-label">Variante site-logo--hidden (état masqué)</p>
  <div class="demo-section demo-dark">
    <a href="home.html" class="site-logo site-logo--hidden">
      <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story  élevage de carpes koïs Konishi">
    </a>
    <p class="demo-text demo-text--white">Logo masqué (opacity:0)  utilisé sur la home quand le hero est visible</p>
  </div>
</body>
</html>
