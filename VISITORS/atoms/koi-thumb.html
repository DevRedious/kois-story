<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom  Koi Thumb | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>
  <p class="demo-label">Ratio 3/4  portrait (card produit)</p>
  <div class="demo-row">
    <div class="koi-thumb koi-thumb--3-4 w-180">
      <img src="../../docs/assets/butterfly-tancho-kujaku.jpg" alt="Butterfly Tancho Kujaku">
    </div>
    <div class="koi-thumb koi-thumb--3-4 w-240">
      <img src="../../docs/assets/24148-Sakura-Grand-Voile-Suda-600x800.jpg" alt="Sakura Grand Voile Suda">
    </div>
    <div class="koi-thumb koi-thumb--3-4 w-180">
      <div class="koi-thumb__placeholder">Photo à venir</div>
    </div>
  </div>

  <p class="demo-label">Ratio 4/3  paysage (éditorial / hero compact)</p>
  <div class="demo-row">
    <div class="koi-thumb koi-thumb--4-3 w-320">
      <img src="../../docs/assets/carpe-koi-showa-scaled.jpg" alt="Carpe Koï Showa">
    </div>
  </div>

  <p class="demo-label">Ratio 4/3 avec overlay gradient  texte superposé</p>
  <div class="demo-row">
    <div class="koi-thumb koi-thumb--4-3 koi-thumb--overlay w-320">
      <img src="../../docs/assets/carpe-koi-showa-scaled-hero.jpg" alt="Hero Showa">
    </div>
  </div>

  <p class="demo-label">Ratio 1/1  carré (shop card)</p>
  <div class="demo-row">
    <div class="koi-thumb koi-thumb--1-1 w-180">
      <img src="../../docs/assets/butterfly-tancho-kujaku.jpg" alt="Butterfly Tancho">
    </div>
  </div>
</body>
</html>
