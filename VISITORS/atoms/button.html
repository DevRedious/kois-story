<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom — Button | Koi's Story</title>
  <link rel="stylesheet" href="../../docs/design/tokens.css">
  <link rel="stylesheet" href="../../docs/design/fonts.css">
  <link rel="stylesheet" href="../../docs/design/reset.css">
  <style>
    body { padding: var(--sp-8); background: var(--c-cream); }
    .demo-label { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
      letter-spacing: var(--tracking-wider); color: var(--n-55); margin-bottom: var(--sp-4);
      margin-top: var(--sp-8); }
    .group { display: flex; flex-wrap: wrap; gap: var(--sp-3); align-items: center; }
    .demo-dark { background: var(--c-black); padding: var(--sp-6); border-radius: var(--r-xl);
      margin-top: var(--sp-4); display: flex; flex-wrap: wrap; gap: var(--sp-3); align-items: center; }

    /* ── BUTTON ATOM ────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-6);
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 700;
      line-height: 1;
      transition: background var(--t-fast), color var(--t-fast),
                  border-color var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
      white-space: nowrap;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn--primary { background: var(--c-red); color: var(--c-white); border-color: var(--c-red); }
    .btn--primary:hover { background: #630f0f; border-color: #630f0f; box-shadow: var(--shadow-red); }

    .btn--ghost { background: transparent; color: var(--c-wine); border-color: var(--c-wine); }
    .btn--ghost:hover { background: var(--c-wine); color: var(--c-white); }

    .btn--ghost-white { background: transparent; color: var(--c-white); border-color: var(--c-white); }
    .btn--ghost-white:hover { background: var(--c-white); color: var(--c-black); }

    .btn--dark { background: var(--c-black); color: var(--c-white); border-color: var(--c-black); }
    .btn--dark:hover { background: rgba(0,0,0,0.80); border-color: rgba(0,0,0,0.80); }

    .btn--wa { background: var(--c-wa); color: var(--c-white); border-color: var(--c-wa); }
    .btn--wa:hover { background: #25d366; border-color: #25d366; box-shadow: var(--shadow-wa); }

    .btn--sm { padding: var(--sp-2) var(--sp-4); font-size: var(--text-sm); }
    .btn--lg { padding: var(--sp-4) var(--sp-8); font-size: var(--text-lg); }
    .btn--full { width: 100%; }
  </style>
</head>
<body>
  <p class="demo-label">Bouton primaire — rouge</p>
  <div class="group">
    <button class="btn btn--primary btn--sm">Voir →</button>
    <button class="btn btn--primary">Voir le catalogue</button>
    <button class="btn btn--primary btn--lg">Découvrir nos koïs</button>
  </div>

  <p class="demo-label">Bouton ghost — bordeaux</p>
  <div class="group">
    <button class="btn btn--ghost btn--sm">En savoir plus</button>
    <button class="btn btn--ghost">Notre élevage</button>
    <button class="btn btn--ghost btn--lg">Nous découvrir</button>
  </div>

  <p class="demo-label">Bouton dark — noir</p>
  <div class="group">
    <button class="btn btn--dark">En savoir plus</button>
    <button class="btn btn--dark btn--lg">Voir la collection</button>
  </div>

  <p class="demo-label">Bouton WhatsApp + ghost blanc — fond sombre</p>
  <div class="demo-dark">
    <button class="btn btn--wa">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Contacter l'élevage
    </button>
    <button class="btn btn--ghost-white">En savoir plus</button>
  </div>
</body>
</html>
