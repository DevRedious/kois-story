<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom — Button Visitor</title>
  <style>
    @font-face { font-family: 'Inter'; src: url('../../docs/fonts/inter/Inter-Medium.otf'); font-weight: 500; }
    @font-face { font-family: 'Inter'; src: url('../../docs/fonts/inter/Inter-SemiBold.otf'); font-weight: 600; }
    @font-face { font-family: 'Playfair Display'; src: url('../../docs/fonts/playfair-display/PlayfairDisplay-Bold.otf'); font-weight: 700; }
    
    :root {
      --rouge-koi:    #D62828;
      --bleu-profond: #003049;
      --or-konishi:   #E09F3E;
      --gris-pierre:  #6C757D;
      --blanc-perle:  #F8F9FA;
      --font-body:    'Inter', system-ui, sans-serif;
      --font-title:   'Playfair Display', Georgia, serif;
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--blanc-perle); padding: 32px; }
    h3 { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gris-pierre); margin-bottom: 12px; margin-top: 24px; }
    .group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

    /* ── BUTTON ATOM VISITOR ─────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      line-height: 1;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,48,73,0.15); }
    .btn:active { transform: translateY(0); }

    /* Variants */
    .btn-primary { 
      background: var(--rouge-koi); 
      color: #fff; 
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(214,40,40,0.3); }
    
    .btn-secondary { 
      background: var(--bleu-profond); 
      color: #fff; 
    }
    .btn-secondary:hover { box-shadow: 0 4px 16px rgba(0,48,73,0.25); }
    
    .btn-outline { 
      background: transparent; 
      border: 2px solid var(--bleu-profond); 
      color: var(--bleu-profond); 
    }
    .btn-outline:hover { background: var(--bleu-profond); color: #fff; }
    
    .btn-gold { 
      background: var(--or-konishi); 
      color: var(--bleu-profond); 
    }
    .btn-gold:hover { box-shadow: 0 4px 16px rgba(224,159,62,0.4); }
    
    .btn-whatsapp { 
      background: #25D366; 
      color: #fff; 
    }
    .btn-whatsapp:hover { box-shadow: 0 4px 16px rgba(37,211,102,0.35); }

    /* Sizes */
    .btn-sm { padding: 10px 18px; font-size: 0.85rem; }
    .btn-lg { padding: 18px 36px; font-size: 1.05rem; }
    .btn-xl { padding: 20px 40px; font-size: 1.1rem; }

    /* With icon */
    .btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 50%; }
    .btn-icon.btn-sm { width: 36px; height: 36px; }
    .btn-icon.btn-lg { width: 56px; height: 56px; }

    /* Disabled */
    .btn:disabled, .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <h3>Primary — Call to action principal</h3>
  <div class="group">
    <button class="btn btn-primary">Découvrir le catalogue</button>
    <button class="btn btn-primary btn-lg">Commander via WhatsApp</button>
  </div>

  <h3>Secondary — Actions secondaires</h3>
  <div class="group">
    <button class="btn btn-secondary">Voir la fiche</button>
    <button class="btn btn-secondary btn-sm">En savoir plus</button>
  </div>

  <h3>Outline — Style léger</h3>
  <div class="group">
    <button class="btn btn-outline">Filtrer</button>
    <button class="btn btn-outline btn-sm">Réinitialiser</button>
  </div>

  <h3>Gold — Premium / Konishi</h3>
  <div class="group">
    <button class="btn btn-gold">★ Lignée Konishi</button>
    <button class="btn btn-gold btn-sm">Certifié</button>
  </div>

  <h3>WhatsApp — Contact direct</h3>
  <div class="group">
    <button class="btn btn-whatsapp btn-lg"><img src="../../docs/assets/LogosWhatsappIcon.svg" alt="WhatsApp" style="height: 20px; width: auto; margin-right: 6px; filter: brightness(0) invert(1);"> Contacter sur WhatsApp</button>
    <button class="btn btn-whatsapp btn-xl">Commander ce koï</button>
  </div>

  <h3>Icônes rondes</h3>
  <div class="group">
    <button class="btn btn-primary btn-icon">❮</button>
    <button class="btn btn-primary btn-icon btn-lg">❯</button>
    <button class="btn btn-outline btn-icon">♡</button>
  </div>

  <h3>Disabled</h3>
  <div class="group">
    <button class="btn btn-primary" disabled>Vendu</button>
    <button class="btn btn-outline" disabled>Indisponible</button>
  </div>

</body>
</html>
