<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom — Button | Koi's Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-red:    #e60000;
      --color-wine:   #630f0f;
      --color-black:  #000000;
      --color-cream:  #f5f5f2;
      --color-white:  #ffffff;
      --color-red-dark:  #cc0000;
      --color-red-light: #ff1a1a;
      --gray-900: #0a0a0a; --gray-800: #1a1a1a; --gray-700: #2d2d2d;
      --gray-600: #404040; --gray-500: #525252; --gray-400: #737373;
      --gray-300: #a3a3a3; --gray-200: #d4d4d4; --gray-100: #f0f0ee;
      --color-wa: #25d366;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'Open Sans', system-ui, sans-serif;
      --sp-1: .25rem; --sp-2: .5rem; --sp-3: .75rem; --sp-4: 1rem;
      --sp-5: 1.25rem; --sp-6: 1.5rem; --sp-8: 2rem;
      --shadow-red: 0 4px 20px rgba(230,0,0,0.4);
      --r-sm: .375rem; --r-md: .5rem; --r-lg: .75rem; --r-full: 9999px;
      --t-fast: 150ms ease; --t-base: 300ms ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--color-cream); color: var(--gray-800); line-height: 1.6; padding: 2rem; -webkit-font-smoothing: antialiased; }
    .demo-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); margin-bottom: 0.75rem; margin-top: 2rem; }
    .group { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }

    /* ── BUTTON ATOM ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      padding: 13px 26px;
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid transparent;
      line-height: 1;
      transition: all var(--t-base);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    /* Primary — rouge */
    .btn--primary {
      background: var(--color-red);
      color: var(--color-white);
      border-color: var(--color-red);
    }
    .btn--primary:hover {
      background: var(--color-red-dark);
      border-color: var(--color-red-dark);
      box-shadow: var(--shadow-red);
    }

    /* Dark */
    .btn--dark {
      background: var(--gray-900);
      color: var(--color-white);
      border-color: var(--gray-900);
    }
    .btn--dark:hover {
      background: var(--gray-800);
      border-color: var(--gray-800);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* Outline rouge */
    .btn--outline {
      background: transparent;
      color: var(--color-red);
      border-color: var(--color-red);
    }
    .btn--outline:hover {
      background: var(--color-red);
      color: var(--color-white);
      box-shadow: var(--shadow-red);
    }

    /* Outline light (pour fonds sombres) */
    .btn--outline-light {
      background: transparent;
      color: var(--color-white);
      border-color: rgba(255,255,255,0.6);
    }
    .btn--outline-light:hover {
      background: var(--color-white);
      color: var(--gray-900);
      border-color: var(--color-white);
    }

    /* WhatsApp */
    .btn--whatsapp {
      background: var(--color-wa);
      color: var(--color-white);
      border-color: var(--color-wa);
    }
    .btn--whatsapp:hover {
      background: #1db954;
      border-color: #1db954;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    }

    /* Sizes */
    .btn--sm  { padding: 9px 18px; font-size: 0.8rem; }
    .btn--lg  { padding: 16px 34px; font-size: 1rem; }
    .btn--xl  { padding: 18px 40px; font-size: 1.05rem; }

    /* Icon-only round */
    .btn--icon {
      width: 44px; height: 44px; padding: 0;
      border-radius: var(--r-full);
    }
    .btn--icon.btn--sm { width: 36px; height: 36px; }
    .btn--icon.btn--lg { width: 56px; height: 56px; font-size: 1.1rem; }

    /* Full width */
    .btn--full { width: 100%; }

    /* Disabled */
    .btn:disabled,
    .btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>

  <p class="demo-label">Primary — CTA principal (rouge #e60000)</p>
  <div class="group">
    <button class="btn btn--primary btn--sm">Voir le catalogue</button>
    <button class="btn btn--primary">Découvrir nos koïs</button>
    <button class="btn btn--primary btn--lg">Commander via WhatsApp</button>
    <button class="btn btn--primary btn--xl">Voir ce koï</button>
  </div>

  <p class="demo-label">Dark — Action secondaire</p>
  <div class="group">
    <button class="btn btn--dark btn--sm">En savoir plus</button>
    <button class="btn btn--dark">Notre élevage</button>
    <button class="btn btn--dark btn--lg">Nous découvrir</button>
  </div>

  <p class="demo-label">Outline — Style léger sur fond clair</p>
  <div class="group">
    <button class="btn btn--outline btn--sm">Filtrer</button>
    <button class="btn btn--outline">Réinitialiser</button>
    <button class="btn btn--outline btn--lg">Voir toutes les variétés</button>
  </div>

  <p class="demo-label">Outline Light — Sur fond sombre</p>
  <div class="group" style="background: var(--gray-900); padding: 1rem; border-radius: 0.5rem;">
    <button class="btn btn--outline-light btn--sm">En savoir plus</button>
    <button class="btn btn--outline-light">Nous contacter</button>
    <button class="btn btn--outline-light btn--lg">Voir le catalogue</button>
  </div>

  <p class="demo-label">WhatsApp — Contact direct</p>
  <div class="group">
    <button class="btn btn--whatsapp btn--sm">💬 WhatsApp</button>
    <button class="btn btn--whatsapp">💬 Nous contacter</button>
    <button class="btn btn--whatsapp btn--lg">💬 Contacter sur WhatsApp</button>
    <button class="btn btn--whatsapp btn--xl">💬 Commander ce koï</button>
  </div>

  <p class="demo-label">Boutons icônes ronds</p>
  <div class="group">
    <button class="btn btn--primary btn--icon btn--sm">❮</button>
    <button class="btn btn--primary btn--icon">❯</button>
    <button class="btn btn--primary btn--icon btn--lg">♡</button>
    <button class="btn btn--dark btn--icon">✕</button>
    <button class="btn btn--outline btn--icon">↑</button>
  </div>

  <p class="demo-label">Pleine largeur</p>
  <div class="group" style="max-width: 320px; flex-direction: column;">
    <button class="btn btn--primary btn--full btn--lg">💬 Demander par WhatsApp</button>
    <button class="btn btn--outline btn--full">Voir la fiche complète</button>
  </div>

  <p class="demo-label">Disabled</p>
  <div class="group">
    <button class="btn btn--primary" disabled>Vendu</button>
    <button class="btn btn--whatsapp" disabled>💬 Indisponible</button>
    <button class="btn btn--outline" disabled>Réservé</button>
  </div>

</body>
</html>
