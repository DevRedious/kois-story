<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Koi Card | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>
  <div class="demo-grid">

    <!-- Card disponible + Konishi -->
    <article class="koi-card">
      <div class="koi-card__thumb">
        <img src="../../docs/assets/24148-Sakura-Grand-Voile-Suda-600x800.jpg" alt="Sakura">
        <div class="koi-card__badges">
          <span class="badge badge--konishi"><span aria-hidden="true">★</span> Konishi</span>
          <span class="badge badge--new">Nouveau</span>
        </div>
      </div>
      <div class="koi-card__body">
        <h3 class="koi-card__name">Sakura</h3>
        <div class="koi-card__meta">
          <span class="badge badge--variety">Grand Voile Suda</span>
        </div>
        <div class="koi-card__specs">
          <span>♀ Femelle</span>
          <span>55 cm</span>
          <span>Nisaï</span>
        </div>
        <div class="koi-card__price" aria-label="1 800 euros"><sup aria-hidden="true">€</sup>1 800</div>
      </div>
      <div class="koi-card__footer">
        <a href="../pages/product.html" class="koi-card__btn" aria-label="Voir la fiche de Sakura">Voir <span aria-hidden="true">→</span></a>
      </div>
    </article>

    <!-- Card standard -->
    <article class="koi-card">
      <div class="koi-card__thumb">
        <img src="../../docs/assets/butterfly-tancho-kujaku.jpg" alt="Butterfly Tancho">
        <div class="koi-card__badges">
          <span class="badge badge--konishi"><span aria-hidden="true">★</span> Konishi</span>
        </div>
      </div>
      <div class="koi-card__body">
        <h3 class="koi-card__name">Butterfly Tancho</h3>
        <div class="koi-card__meta">
          <span class="badge badge--variety">Kujaku</span>
        </div>
        <div class="koi-card__specs">
          <span>♂ Mâle</span>
          <span>48 cm</span>
          <span>Tosaï</span>
        </div>
        <div class="koi-card__price" aria-label="950 euros"><sup aria-hidden="true">€</sup>950</div>
      </div>
      <div class="koi-card__footer">
        <a href="../pages/product.html" class="koi-card__btn" aria-label="Voir la fiche de Butterfly Tancho">Voir <span aria-hidden="true">→</span></a>
      </div>
    </article>

    <!-- Card vendue -->
    <article class="koi-card koi-card--sold">
      <div class="koi-card__thumb">
        <img src="../../docs/assets/carpe-koi-showa-scaled.jpg" alt="Showa">
      </div>
      <div class="koi-card__body">
        <h3 class="koi-card__name">Asahi</h3>
        <div class="koi-card__meta">
          <span class="badge badge--variety">Showa</span>
        </div>
        <div class="koi-card__specs">
          <span>♀ Femelle</span>
          <span>62 cm</span>
          <span>Sansaï</span>
        </div>
        <div class="koi-card__price" aria-label="2 400 euros"><sup aria-hidden="true">€</sup>2 400</div>
      </div>
      <div class="koi-card__footer">
        <span class="koi-card__btn">Vendu</span>
      </div>
    </article>

  </div>
</body>
</html>
