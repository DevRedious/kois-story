<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Koi Card | Koi's Story</title>
  <link rel="stylesheet" href="../../docs/design/tokens.css">
  <link rel="stylesheet" href="../../docs/design/fonts.css">
  <link rel="stylesheet" href="../../docs/design/reset.css">
  <style>
    body { padding: var(--sp-8); background: var(--c-cream); }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-6);
      max-width: 960px;
    }

    /* ── KOI CARD MOLECULE ──────────────────────────────────────────────── */
    .koi-card {
      background: var(--c-white);
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform var(--t-base), box-shadow var(--t-base);
      display: flex; flex-direction: column;
    }
    .koi-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    /* Image */
    .koi-card__thumb {
      position: relative; overflow: hidden;
      aspect-ratio: 3 / 4; background: var(--n-08);
    }
    .koi-card__thumb img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform var(--t-slow);
    }
    .koi-card:hover .koi-card__thumb img { transform: scale(1.06); }

    /* Badges sur l'image */
    .koi-card__badges {
      position: absolute; top: var(--sp-3); left: var(--sp-3);
      display: flex; flex-direction: column; gap: var(--sp-1);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: var(--r-full);
      font-family: var(--font-sans); font-size: var(--text-xs);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: var(--tracking-wide); line-height: 1; white-space: nowrap;
    }
    .badge--konishi { background: var(--c-wine); color: var(--c-cream); }
    .badge--new     { background: var(--c-red);  color: var(--c-white); }

    /* Corps */
    .koi-card__body { padding: var(--sp-4); flex: 1; display: flex; flex-direction: column; gap: var(--sp-2); }

    .koi-card__name {
      font-family: var(--font-serif); font-size: var(--text-xl); font-weight: 700;
      color: var(--c-black); line-height: var(--leading-snug);
    }
    .koi-card__meta { display: flex; flex-wrap: wrap; gap: var(--sp-1); }
    .badge--variety {
      background: var(--c-wine-10); color: var(--c-wine);
      border: 1px solid var(--c-wine-20);
    }
    .koi-card__specs {
      font-size: var(--text-sm); color: var(--n-55);
      display: flex; gap: var(--sp-3);
    }

    .koi-card__price {
      font-family: var(--font-serif); font-size: var(--text-2xl);
      font-weight: 700; color: var(--c-red); line-height: 1;
      margin-top: auto; padding-top: var(--sp-2);
    }
    .koi-card__price sup { font-size: 0.55em; vertical-align: super; }

    /* Footer */
    .koi-card__footer { padding: var(--sp-3) var(--sp-4); border-top: 1px solid var(--n-08); }
    .koi-card__btn {
      display: block; width: 100%; padding: var(--sp-2) var(--sp-4);
      background: var(--c-red); color: var(--c-white);
      border-radius: var(--r-md); text-align: center;
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 700;
      transition: background var(--t-fast);
      text-decoration: none;
    }
    .koi-card__btn:hover { background: var(--c-wine); }

    /* Épuisé */
    .koi-card--sold { opacity: 0.72; }
    .koi-card--sold .koi-card__btn { background: var(--n-36); cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="demo-grid">

    <!-- Card disponible + Konishi -->
    <article class="koi-card">
      <div class="koi-card__thumb">
        <img src="../../docs/assets/24148-Sakura-Grand-Voile-Suda-600x800.jpg" alt="Sakura">
        <div class="koi-card__badges">
          <span class="badge badge--konishi">★ Konishi</span>
          <span class="badge badge--new">Nouveau</span>
        </div>
      </div>
      <div class="koi-card__body">
        <h3 class="koi-card__name">Sakura</h3>
        <div class="koi-card__meta">
          <span class="badge badge--variety">Grand Voile Suda</span>
        </div>
        <div class="koi-card__specs">
          <span>♀ Femelle</span>
          <span>55 cm</span>
          <span>Nisaï</span>
        </div>
        <div class="koi-card__price"><sup>€</sup>1 800</div>
      </div>
      <div class="koi-card__footer">
        <a href="../pages/product.html" class="koi-card__btn">Voir →</a>
      </div>
    </article>

    <!-- Card standard -->
    <article class="koi-card">
      <div class="koi-card__thumb">
        <img src="../../docs/assets/butterfly-tancho-kujaku.jpg" alt="Butterfly Tancho">
        <div class="koi-card__badges">
          <span class="badge badge--konishi">★ Konishi</span>
        </div>
      </div>
      <div class="koi-card__body">
        <h3 class="koi-card__name">Butterfly Tancho</h3>
        <div class="koi-card__meta">
          <span class="badge badge--variety">Kujaku</span>
        </div>
        <div class="koi-card__specs">
          <span>♂ Mâle</span>
          <span>48 cm</span>
          <span>Tosaï</span>
        </div>
        <div class="koi-card__price"><sup>€</sup>950</div>
      </div>
      <div class="koi-card__footer">
        <a href="../pages/product.html" class="koi-card__btn">Voir →</a>
      </div>
    </article>

    <!-- Card vendue -->
    <article class="koi-card koi-card--sold">
      <div class="koi-card__thumb">
        <img src="../../docs/assets/carpe-koi-showa-scaled.jpg" alt="Showa">
      </div>
      <div class="koi-card__body">
        <h3 class="koi-card__name">Asahi</h3>
        <div class="koi-card__meta">
          <span class="badge badge--variety">Showa</span>
        </div>
        <div class="koi-card__specs">
          <span>♀ Femelle</span>
          <span>62 cm</span>
          <span>Sansaï</span>
        </div>
        <div class="koi-card__price"><sup>€</sup>2 400</div>
      </div>
      <div class="koi-card__footer">
        <span class="koi-card__btn">Vendu</span>
      </div>
    </article>

  </div>
</body>
</html>
