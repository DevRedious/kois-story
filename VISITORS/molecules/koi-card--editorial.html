<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule  Koi Card Editorial | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>

  <p class="demo-label">Card éditoriale 16/9  spécimen phare</p>
  <a href="../pages/product.html" class="koi-card-editorial koi-card-editorial--16-9">
    <img class="koi-card-editorial__img"
         src="../../docs/assets/carpe-koi-showa-scaled-hero.jpg"
         alt="Hanabi  Showa Sansaï, koï d'exception Konishi">
    <div class="koi-card-editorial__overlay"></div>
    <div class="koi-card-editorial__content">
      <div class="koi-card-editorial__info">
        <div class="koi-card-editorial__badges">
          <span class="badge badge--konishi"><span aria-hidden="true">★</span> Konishi</span>
          <span class="badge badge--variety">Showa</span>
        </div>
        <h3 class="koi-card-editorial__name">Hanabi</h3>
        <p class="koi-card-editorial__sub">70 cm · Sansaï · Femelle</p>
      </div>
      <div class="koi-card-editorial__cta">
        <span class="koi-card-editorial__price" aria-label="3 500 euros">3 500 <sup aria-hidden="true">€</sup></span>
        <span class="btn-primary">Voir la fiche <span aria-hidden="true">→</span></span>
      </div>
    </div>
  </a>

  <p class="demo-label">Card éditoriale 4/3  variante compacte</p>
  <a href="../pages/product.html" class="koi-card-editorial koi-card-editorial--4-3">
    <img class="koi-card-editorial__img"
         src="../../docs/assets/carpe-koi-showa-scaled.jpg"
         alt="Yuki  Kohaku Nisaï">
    <div class="koi-card-editorial__overlay"></div>
    <div class="koi-card-editorial__content">
      <div class="koi-card-editorial__info">
        <div class="koi-card-editorial__badges">
          <span class="badge badge--konishi"><span aria-hidden="true">★</span> Konishi</span>
          <span class="badge badge--variety">Kohaku</span>
        </div>
        <h3 class="koi-card-editorial__name">Yuki</h3>
        <p class="koi-card-editorial__sub">58 cm · Nisaï · Femelle</p>
      </div>
      <div class="koi-card-editorial__cta">
        <span class="koi-card-editorial__price" aria-label="2 100 euros">2 100 <sup aria-hidden="true">€</sup></span>
        <span class="btn-primary">Voir <span aria-hidden="true">→</span></span>
      </div>
    </div>
  </a>

</body>
</html>
