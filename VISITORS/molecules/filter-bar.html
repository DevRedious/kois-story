<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Filter Bar | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-bar__inner">
      <span class="filter-bar__label">Filtrer :</span>

      <select class="filter-select" id="filter-variety" aria-label="Variété">
        <option value="">Toutes variétés</option>
        <option value="kohaku">Kohaku</option>
        <option value="showa">Showa</option>
        <option value="sanke">Sanke</option>
        <option value="butterfly">Butterfly</option>
        <option value="tancho">Tancho</option>
        <option value="goshiki">Goshiki</option>
        <option value="asagi">Asagi</option>
        <option value="kujaku">Kujaku</option>
      </select>

      <select class="filter-select" id="filter-age" aria-label="Classe d'âge">
        <option value="">Tout âge</option>
        <option value="tosai">Tosaï</option>
        <option value="jumbo-tosai">Jumbo Tosaï</option>
        <option value="nisai">Nisaï</option>
        <option value="sansai">Sansaï</option>
        <option value="yonsai">Yonsaï</option>
        <option value="gosai">Gosai</option>
      </select>

      <select class="filter-select" id="filter-price" aria-label="Prix maximum">
        <option value="">Prix max</option>
        <option value="500">≤ 500 €</option>
        <option value="1000">≤ 1 000 €</option>
        <option value="2000">≤ 2 000 €</option>
        <option value="5000">≤ 5 000 €</option>
      </select>

      <div class="filter-bar__sep"></div>

      <label class="filter-toggle">
        <input type="checkbox" id="filter-konishi">
        <span class="filter-toggle__text">★ Konishi uniquement</span>
      </label>

      <button class="filter-reset" id="filter-reset">Réinitialiser</button>

      <span class="filter-bar__count" id="filter-count">24 koïs</span>
    </div>
  </div>

  <div class="demo-content">
    <p>Zone catalogue — les cards apparaissent ici</p>
  </div>

  <script>
    document.getElementById('filter-reset').addEventListener('click', () => {
      document.getElementById('filter-variety').value = '';
      document.getElementById('filter-age').value = '';
      document.getElementById('filter-price').value = '';
      document.getElementById('filter-konishi').checked = false;
    });
  </script>
</body>
</html>
