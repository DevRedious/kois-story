<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Nav Header | Koi's Story</title>
  <link rel="stylesheet" href="../../docs/design/tokens.css">
  <link rel="stylesheet" href="../../docs/design/fonts.css">
  <link rel="stylesheet" href="../../docs/design/reset.css">
  <style>
    /* ── NAV HEADER MOLECULE ────────────────────────────────────────────── */

    /* ── LOGO indépendant ────────────────────────────────────────── */
    .site-logo {
      position: fixed; top: var(--sp-5); left: var(--sp-8); z-index: 100;
      pointer-events: all;
      transition: opacity var(--t-base), transform var(--t-base);
    }
    .site-logo img { height: 72px; width: auto; display: block; }
    .site-logo--hidden { opacity: 0; pointer-events: none; transform: translateY(-6px); }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: var(--sp-4) var(--sp-8);
      pointer-events: none;
      display: flex; justify-content: flex-end;
      transition: padding var(--t-base);
    }
    .site-header--scrolled { padding: var(--sp-3) var(--sp-8); }

    /* Pill flottante */
    .header__pill {
      pointer-events: all;
      width: fit-content;
      display: flex; align-items: center;
      padding: 0 var(--sp-3); height: 50px;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: var(--r-full);
      transition: background var(--t-base), box-shadow var(--t-base);
    }
    .site-header--scrolled .header__pill {
      background: rgba(0, 0, 0, 0.68);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* Nav + liquid indicator */
    .header__nav {
      display: flex; justify-content: center; align-items: center;
      position: relative;
    }
    .header__nav > ul { display: flex; gap: var(--sp-1); list-style: none; align-items: center; }

    .nav__indicator {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 34px; border-radius: var(--r-full);
      background: rgba(255, 255, 255, 0.12);
      transition: left 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  width 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity var(--t-fast);
      pointer-events: none; opacity: 0; z-index: 0;
    }

    .header__nav a {
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600;
      color: var(--c-white); letter-spacing: 0.04em;
      padding: var(--sp-2) var(--sp-3);
      transition: color var(--t-fast);
      position: relative; z-index: 1; white-space: nowrap;
    }
    .header__nav a.active { color: var(--c-red); }

    /* Dropdown Produits */
    .has-dropdown { position: relative; }
    .dropdown-toggle { display: flex; align-items: center; gap: 4px; cursor: default; }
    .dropdown-toggle svg { flex-shrink: 0; transition: transform var(--t-fast); }
    .has-dropdown:hover .dropdown-toggle svg,
    .has-dropdown:focus-within .dropdown-toggle svg { transform: rotate(180deg); }

    .dropdown {
      position: absolute; top: calc(100% + var(--sp-3)); left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(8, 8, 8, 0.80);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--w-10); border-radius: var(--r-xl);
      padding: var(--sp-2) 0; min-width: 168px; list-style: none;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-fast), transform var(--t-fast);
    }
    .dropdown::before {
      content: ''; position: absolute;
      bottom: 100%; left: 0; right: 0;
      height: calc(var(--sp-3) + 4px);
    }
    .has-dropdown:hover .dropdown,
    .has-dropdown:focus-within .dropdown {
      opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0);
    }
    .dropdown li a {
      display: block; padding: var(--sp-2) var(--sp-5); white-space: nowrap;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .dropdown li a:hover { background: var(--w-06); color: var(--c-red); }

    /* Burger animé */
    .header__burger {
      display: none; flex-direction: column; gap: 5px;
      margin-left: auto; cursor: pointer; border: none; padding: var(--sp-3);
      background: rgba(0, 0, 0, 0.45);
      border-radius: var(--r-full);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }
    .header__burger span {
      display: block; width: 22px; height: 2px; background: var(--c-white);
      transition: transform var(--t-base), opacity var(--t-fast);
      transform-origin: center;
    }
    .header__burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .header__burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .header__burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Backdrop mobile */
    .nav-backdrop {
      display: none; position: fixed; inset: 0; z-index: 90;
      background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(4px);
      opacity: 0; transition: opacity var(--t-base);
    }
    .nav-backdrop.visible { opacity: 1; }

    @media (max-width: 900px) {
      .header__pill {
        backdrop-filter: none; -webkit-backdrop-filter: none;
        background: transparent; border-color: transparent;
        padding: 0;
      }
      .header__nav { display: none; }
      .header__burger { display: flex; }
      .header__nav.open {
        display: block;
        position: fixed; top: 74px;
        left: var(--sp-4); right: var(--sp-4);
        background: rgba(0, 0, 0, 0.88);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--w-10); border-radius: var(--r-2xl);
        padding: var(--sp-3);
        overflow: hidden;
        animation: slideDown 300ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .header__nav.open > ul {
        display: flex; flex-direction: column;
        list-style: none; margin: 0; padding: 0; gap: 0;
      }
      .header__nav.open > ul > li > a,
      .header__nav.open > ul > li > .dropdown-toggle {
        display: flex; align-items: center; justify-content: space-between;
        width: 100%; padding: var(--sp-3) var(--sp-4);
        border-radius: var(--r-lg); box-sizing: border-box;
        font-size: var(--text-base); font-weight: 600;
        white-space: normal; border-bottom: none;
        transition: background var(--t-fast);
      }
      .header__nav.open > ul > li > a:hover,
      .header__nav.open > ul > li > .dropdown-toggle:hover { background: var(--w-06); }
      .header__nav.open > ul > li > a.active { color: var(--c-red); }
      .nav__indicator { display: none; }
      .dropdown {
        display: none;
        position: static; transform: none; opacity: 1; pointer-events: auto;
        background: none; backdrop-filter: none; -webkit-backdrop-filter: none;
        border: none; border-radius: 0;
        padding: 0 0 var(--sp-2) 0;
        box-shadow: none; min-width: unset; list-style: none;
      }
      .dropdown.dropdown--open { display: block; }
      .dropdown li a {
        display: block;
        padding: var(--sp-2) var(--sp-4) var(--sp-2) calc(var(--sp-4) + var(--sp-4));
        border-radius: var(--r-md);
        font-size: var(--text-sm); color: var(--w-70);
        white-space: normal;
        transition: background var(--t-fast), color var(--t-fast);
      }
      .dropdown li a:hover { background: var(--w-06); color: var(--c-white); }
      .dropdown-toggle svg { display: inline; transition: transform var(--t-fast); }
      .dropdown-toggle.open svg { transform: rotate(180deg); }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }

    /* Demo hero placeholder */
    .demo-hero {
      height: 100vh; background: var(--c-black);
      display: flex; align-items: center; justify-content: center;
    }
    .demo-hero p { color: var(--w-50); font-size: var(--text-xl); }
  </style>
</head>
<body style="margin:0; background:#000000">

  <!-- LOGO -->
  <a href="../pages/home.html" class="site-logo" id="site-logo">
    <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story">
  </a>

  <!-- HEADER -->
  <header class="site-header" id="site-header">
    <div class="header__pill">
      <nav class="header__nav" id="header-nav" aria-label="Navigation principale">
        <span class="nav__indicator" id="nav-indicator"></span>
        <ul>
          <li><a href="../pages/home.html" class="active">Accueil</a></li>
          <li><a href="../pages/kois.html">Nos Koïs</a></li>
          <li class="has-dropdown">
            <a href="#" class="dropdown-toggle">
              Produits
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg>
            </a>
            <ul class="dropdown">
              <li><a href="../pages/materiel.html">Matériel</a></li>
              <li><a href="../pages/nourriture.html">Nourriture</a></li>
              <li><a href="../pages/soins.html">Soins</a></li>
            </ul>
          </li>
          <li><a href="../pages/azukari.html">Azukari</a></li>
        </ul>
      </nav>
      <button class="header__burger" id="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </header>
  <div class="nav-backdrop" id="nav-backdrop"></div>

  <div class="demo-hero">
    <p>Section hero (scroll pour voir la transition)</p>
  </div>

  <script src="../assets/js/header.js"></script>
  <script>
    // ── Active page detection ────────────────────────────────────────
    const currentPage = window.location.pathname.split('/').pop() || 'home.html';
    const subPages = { 'materiel.html': true, 'nourriture.html': true, 'soins.html': true };
    document.querySelectorAll('.header__nav a[href]').forEach(link => {
      if (link.getAttribute('href') !== '#' && link.getAttribute('href').split('/').pop() === currentPage) {
        link.classList.add('active');
      }
    });
    if (subPages[currentPage]) {
      document.querySelector('.dropdown-toggle')?.classList.add('active');
    }

    // ── Liquid indicator ─────────────────────────────────────────────
    const navEl     = document.getElementById('header-nav');
    const navList   = navEl.querySelector('ul');
    const indicator = document.getElementById('nav-indicator');

    function moveIndicator(li) {
      const navRect = navEl.getBoundingClientRect();
      const liRect  = li.getBoundingClientRect();
      indicator.style.left    = (liRect.left - navRect.left) + 'px';
      indicator.style.width   = liRect.width + 'px';
      indicator.style.opacity = '1';
    }
    function resetIndicator() {
      const activeLi = navList.querySelector('li:has(a.active)');
      if (activeLi) { moveIndicator(activeLi); }
      else { indicator.style.opacity = '0'; }
    }
    navList.querySelectorAll(':scope > li').forEach(li => {
      li.addEventListener('mouseenter', () => moveIndicator(li));
    });
    navList.addEventListener('mouseleave', resetIndicator);
    window.addEventListener('load', resetIndicator);

    // ── Burger / menu mobile ─────────────────────────────────────────
    const burger   = document.getElementById('burger');
    const nav      = document.getElementById('header-nav');
    const backdrop = document.getElementById('nav-backdrop');

    function openMenu() {
      nav.classList.add('open');
      burger.classList.add('open');
      burger.setAttribute('aria-expanded', 'true');
      backdrop.style.display = 'block';
      requestAnimationFrame(() => backdrop.classList.add('visible'));
    }
    function closeMenu() {
      nav.classList.remove('open');
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded', 'false');
      backdrop.classList.remove('visible');
      backdrop.addEventListener('transitionend', () => { backdrop.style.display = 'none'; }, { once: true });
    }
    burger.addEventListener('click', () => nav.classList.contains('open') ? closeMenu() : openMenu());
    backdrop.addEventListener('click', closeMenu);

    // ── Dropdown toggle mobile ───────────────────────────────────────
    document.querySelector('.dropdown-toggle').addEventListener('click', (e) => {
      if (window.innerWidth <= 900) {
        e.preventDefault();
        const dropdown = e.currentTarget.closest('.has-dropdown').querySelector('.dropdown');
        dropdown.classList.toggle('dropdown--open');
        e.currentTarget.classList.toggle('open');
      }
    });
  </script>
</body>
</html>
