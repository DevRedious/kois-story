<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organism — Header | Koi's Story</title>
  <link rel="stylesheet" href="../../docs/design/tokens.css">
  <link rel="stylesheet" href="../../docs/design/fonts.css">
  <link rel="stylesheet" href="../../docs/design/reset.css">
  <style>
    /* ── SITE HEADER ORGANISM ───────────────────────────────────────────── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-height);
      display: flex; align-items: center;
      padding: 0 var(--sp-8);
      background: transparent;
      transition: background var(--t-base), box-shadow var(--t-base);
    }
    .site-header--scrolled {
      background: var(--c-black);
      box-shadow: var(--shadow-lg);
    }
    .header__inner {
      width: 100%; max-width: var(--max-width); margin: 0 auto;
      display: flex; align-items: center; gap: var(--sp-8);
    }
    .header__logo { flex-shrink: 0; }
    .header__logo img { height: 48px; width: auto; display: block; }

    .header__nav { flex: 1; display: flex; justify-content: center; }
    .header__nav ul { display: flex; gap: var(--sp-6); list-style: none; align-items: center; }
    .header__nav a {
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600;
      color: var(--c-white); letter-spacing: 0.04em;
      padding-bottom: 3px; border-bottom: 2px solid transparent;
      transition: border-color var(--t-fast);
    }
    .header__nav a:hover, .header__nav a.active { border-bottom-color: var(--c-red); }

    .header__cta {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-4); background: var(--c-wa); color: var(--c-white);
      border-radius: var(--r-full); font-family: var(--font-sans);
      font-size: var(--text-sm); font-weight: 700;
      transition: background var(--t-fast);
    }
    .header__cta:hover { background: #25d366; }

    .header__burger {
      display: none; flex-direction: column; gap: 5px; margin-left: auto; cursor: pointer;
    }
    .header__burger span { display: block; width: 24px; height: 2px; background: var(--c-white); }

    @media (max-width: 900px) {
      .header__nav { display: none; }
      .header__burger { display: flex; }
      .header__cta { display: none; }
      .header__nav.open {
        display: flex; position: fixed; top: var(--header-height); left: 0; right: 0;
        background: var(--c-black); flex-direction: column;
        padding: var(--sp-6) var(--sp-8);
      }
      .header__nav.open ul { flex-direction: column; gap: var(--sp-4); }
    }

    /* Demo hero */
    .demo-hero {
      height: 100vh; background: var(--c-black);
      background-image: url('../../docs/assets/carpe-koi-showa-scaled-hero.jpg');
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
    }
    .demo-hero__overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45); pointer-events: none;
    }
    .demo-hero { position: relative; }
    .demo-hero p { color: var(--w-70); font-size: var(--text-xl); position: relative; z-index: 1; }
  </style>
</head>
<body style="margin:0; background:#000000">

  <header class="site-header" id="site-header">
    <div class="header__inner">
      <a href="../pages/home.html" class="header__logo">
        <img src="../../docs/assets/LOGO MANU FINI.png" alt="Koi's Story">
      </a>

      <nav class="header__nav" id="header-nav" aria-label="Navigation principale">
        <ul>
          <li><a href="../pages/home.html" class="active">Accueil</a></li>
          <li><a href="../pages/kois.html">Nos Koïs</a></li>
          <li><a href="../pages/materiel.html">Matériel</a></li>
          <li><a href="../pages/nourriture.html">Nourriture</a></li>
          <li><a href="../pages/soins.html">Soins</a></li>
          <li><a href="../pages/azukari.html">Azukari</a></li>
        </ul>
      </nav>

      <a href="https://wa.me/33600000000" class="header__cta" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

        </svg>
        Contact WhatsApp
      </a>

      <button class="header__burger" id="burger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Demo hero pour voir la transition -->
  <div class="demo-hero" id="demo-hero">
    <div class="demo-hero__overlay"></div>
    <p>Section hero — scrollez pour voir la transition du header</p>
  </div>
  <div style="height:200vh; background:var(--c-cream)"></div>

  <script src="../assets/js/header.js"></script>
  <script>
    const burger = document.getElementById('burger');
    const nav = document.getElementById('header-nav');
    burger.addEventListener('click', () => {
      const open = nav.classList.toggle('open');
      burger.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
