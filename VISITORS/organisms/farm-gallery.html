<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organism — Farm Gallery | Koi's Story</title>
  <link rel="stylesheet" href="../../docs/design/tokens.css">
  <link rel="stylesheet" href="../../docs/design/fonts.css">
  <link rel="stylesheet" href="../../docs/design/reset.css">
  <style>
    body { background: var(--c-cream); margin: 0; }

    /* ── FARM GALLERY ORGANISM ──────────────────────────────────────────── */
    .farm-gallery { padding: var(--sp-20) var(--sp-10); }
    .farm-gallery__inner { max-width: var(--max-width); margin: 0 auto; }

    .farm-gallery__header { margin-bottom: var(--sp-8); }
    .farm-gallery__label {
      font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
      letter-spacing: var(--tracking-wider); color: var(--c-red); margin-bottom: var(--sp-2);
    }
    .farm-gallery__title {
      font-family: var(--font-serif); font-size: var(--text-3xl); font-weight: 700;
      color: var(--c-black); line-height: var(--leading-snug); margin-bottom: var(--sp-3);
    }
    .farm-gallery__sub { font-size: var(--text-base); color: var(--n-55); max-width: 560px; }

    /* Rangée 1 : grande image gauche + 2 petites droite */
    .gallery-row-1 {
      display: grid; grid-template-columns: 2fr 1fr;
      gap: var(--sp-4); margin-bottom: var(--sp-4);
    }
    .gallery-row-1__right { display: flex; flex-direction: column; gap: var(--sp-4); }

    /* Rangée 2 : 3 images égales */
    .gallery-row-2 {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-4); margin-bottom: var(--sp-8);
    }

    /* Cellule photo générique */
    .gallery-cell {
      position: relative; overflow: hidden; border-radius: var(--r-xl);
      background: var(--n-08); cursor: pointer;
    }
    .gallery-cell img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform var(--t-slow); display: block;
    }
    .gallery-cell:hover img { transform: scale(1.05); }

    .gallery-cell--tall { aspect-ratio: 3/4; }
    .gallery-cell--wide { aspect-ratio: 4/3; }
    .gallery-cell--sq   { aspect-ratio: 1/1; }

    /* Placeholder pour images manquantes */
    .gallery-cell__placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: var(--sp-2);
      color: var(--n-36); font-size: var(--text-sm); font-style: italic;
    }
    .gallery-cell__placeholder span { font-size: 2.5rem; }

    /* CTA */
    .farm-gallery__footer { text-align: center; }
    .btn {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-6); background: transparent;
      color: var(--c-wine); border: 2px solid var(--c-wine); border-radius: var(--r-md);
      font-family: var(--font-sans); font-size: var(--text-base); font-weight: 700;
      transition: background var(--t-fast), color var(--t-fast); text-decoration: none;
    }
    .btn:hover { background: var(--c-wine); color: var(--c-white); }

    @media (max-width: 768px) {
      .gallery-row-1 { grid-template-columns: 1fr; }
      .gallery-row-1__right { flex-direction: row; }
      .gallery-row-2 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <section class="farm-gallery">
    <div class="farm-gallery__inner">
      <div class="farm-gallery__header">
        <p class="farm-gallery__label">L'élevage</p>
        <h2 class="farm-gallery__title">Notre élevage</h2>
        <p class="farm-gallery__sub">Découvrez les bassins, les koïs en croissance et la passion qui anime Mathilde et Emmanuel au quotidien.</p>
      </div>

      <!-- Rangée 1 : grande + 2 petites -->
      <div class="gallery-row-1">
        <div class="gallery-cell gallery-cell--tall">
          <img src="../../docs/assets/carpe-koi-showa-scaled-hero.jpg" alt="Bassin principal">
        </div>
        <div class="gallery-row-1__right">
          <div class="gallery-cell gallery-cell--wide">
            <img src="../../docs/assets/24148-Sakura-Grand-Voile-Suda-600x800.jpg" alt="Sakura">
          </div>
          <div class="gallery-cell gallery-cell--wide">
            <img src="../../docs/assets/butterfly-tancho-kujaku.jpg" alt="Butterfly Tancho">
          </div>
        </div>
      </div>

      <!-- Rangée 2 : 3 photos égales -->
      <div class="gallery-row-2">
        <div class="gallery-cell gallery-cell--wide">
          <img src="../../docs/assets/carpe-koi-showa-scaled.jpg" alt="Showa en bassin">
        </div>
        <div class="gallery-cell gallery-cell--wide">
          <div class="gallery-cell__placeholder">
            <span>📷</span>
            <p>Photo à venir</p>
          </div>
        </div>
        <div class="gallery-cell gallery-cell--wide">
          <div class="gallery-cell__placeholder">
            <span>📷</span>
            <p>Photo à venir</p>
          </div>
        </div>
      </div>

      <div class="farm-gallery__footer">
        <a href="../pages/decouvrir.html" class="btn">Découvrir l'élevage →</a>
      </div>
    </div>
  </section>
</body>
</html>
