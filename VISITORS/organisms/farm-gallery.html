<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organism — Farm Gallery | Koi's Story</title>
  <link rel="stylesheet" href="../assets/css/visitor.css">
  <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body>
  <section class="farm-gallery">
    <div class="farm-gallery__inner">
      <div class="farm-gallery__header">
        <p class="farm-gallery__label">L'élevage</p>
        <h2 class="farm-gallery__title">Notre élevage</h2>
        <p class="farm-gallery__sub">Découvrez les bassins, les koïs en croissance et la passion qui anime Mathilde et Emmanuel au quotidien.</p>
      </div>

      <!-- Rangée 1 : grande + 2 petites -->
      <div class="gallery-row-1">
        <div class="gallery-cell gallery-cell--tall">
          <img src="../../docs/assets/carpe-koi-showa-scaled-hero.jpg" alt="Bassin principal">
        </div>
        <div class="gallery-row-1__right">
          <div class="gallery-cell gallery-cell--wide">
            <img src="../../docs/assets/24148-Sakura-Grand-Voile-Suda-600x800.jpg" alt="Sakura">
          </div>
          <div class="gallery-cell gallery-cell--wide">
            <img src="../../docs/assets/butterfly-tancho-kujaku.jpg" alt="Butterfly Tancho">
          </div>
        </div>
      </div>

      <!-- Rangée 2 : 3 photos égales -->
      <div class="gallery-row-2">
        <div class="gallery-cell gallery-cell--wide">
          <img src="../../docs/assets/carpe-koi-showa-scaled.jpg" alt="Showa en bassin">
        </div>
        <div class="gallery-cell gallery-cell--wide">
          <div class="gallery-cell__placeholder">
            <span>📷</span>
            <p>Photo à venir</p>
          </div>
        </div>
        <div class="gallery-cell gallery-cell--wide">
          <div class="gallery-cell__placeholder">
            <span>📷</span>
            <p>Photo à venir</p>
          </div>
        </div>
      </div>

      <div class="farm-gallery__footer">
        <a href="../pages/decouvrir.html" class="btn">Découvrir l'élevage →</a>
      </div>
    </div>
  </section>
</body>
</html>
