<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Organism — Payments Table</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    body { padding: 24px; background: var(--blanc-casse); }
    .amount { font-family: var(--font-title); font-weight: 700; }
    .amount.paid    { color: var(--vert-dispo); }
    .amount.partial { color: #856404; }
    .amount.pending { color: var(--gris); }
  </style>
</head>
<body>

<!-- ── PAYMENTS TABLE ORGANISM ───────────────────────────── -->
<div class="panel">
  <div class="panel-header">
    <span class="panel-title">Paiements</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <select style="padding:6px 10px;border:1.5px solid #d0d7de;border-radius:6px;font-size:0.8rem;" id="pay-filter">
        <option value="">Tous</option>
        <option value="pending">En attente</option>
        <option value="partial">Partiel</option>
        <option value="paid">Payé</option>
      </select>
      <button class="btn btn-primary btn-sm">＋ Saisir paiement</button>
    </div>
  </div>
  <div class="table-responsive">
    <table id="payments-table">
      <thead>
        <tr>
          <th>Cmd</th><th>Client</th><th>Type</th>
          <th>Montant</th><th>Statut</th><th>Reçu le</th><th>Échéance</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr data-status="paid">
          <td><a href="order-form.html" style="color:var(--noir);font-weight:600;">#041</a></td>
          <td>Gérard Dupont</td>
          <td><span class="badge badge-konishi" style="font-size:0.6rem;">Complet</span></td>
          <td><span class="amount paid">1 120,00 €</span></td>
          <td><span class="badge badge-paid">Payé</span></td>
          <td style="font-size:0.8rem;">11/03/2026</td>
          <td style="color:var(--gris);font-size:0.8rem;">—</td>
          <td><button class="btn btn-ghost btn-sm">Voir</button></td>
        </tr>
        <tr data-status="partial">
          <td><a href="order-form.html" style="color:var(--noir);font-weight:600;">#042</a></td>
          <td>Thomas Lefèvre</td>
          <td><span class="badge badge-arrivage" style="font-size:0.6rem;">Acompte</span></td>
          <td><span class="amount partial">200,00 €</span><span style="font-size:0.75rem;color:var(--gris);"> / 850,00 €</span></td>
          <td><span class="badge badge-partial">Partiel</span></td>
          <td style="font-size:0.8rem;">12/03/2026</td>
          <td style="font-size:0.8rem;color:var(--rouge-vif);">30/03/2026</td>
          <td><div class="td-actions">
            <button class="btn btn-success btn-sm">Solder</button>
            <button class="btn btn-ghost btn-sm">Voir</button>
          </div></td>
        </tr>
        <tr data-status="pending">
          <td><a href="order-form.html" style="color:var(--noir);font-weight:600;">#039</a></td>
          <td>Camille Rousseau</td>
          <td><span class="badge badge-vendu" style="font-size:0.6rem;">Échelonné</span></td>
          <td><span class="amount pending">600,00 €</span></td>
          <td><span class="badge badge-pending">En attente</span></td>
          <td style="font-size:0.8rem;color:var(--gris);">—</td>
          <td style="font-size:0.8rem;color:var(--rouge-vif);">15/03/2026</td>
          <td><div class="td-actions">
            <button class="btn btn-success btn-sm">Saisir</button>
            <button class="btn btn-ghost btn-sm">Voir</button>
          </div></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  document.getElementById('pay-filter').addEventListener('change', function() {
    const val = this.value;
    document.querySelectorAll('#payments-table tbody tr').forEach(row => {
      row.style.display = (!val || row.dataset.status === val) ? '' : 'none';
    });
  });
</script>

</body>
</html>
