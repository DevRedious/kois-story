<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organism — Kois Table</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
</head>
<body>

  <div class="panel">

    <div class="panel-header">
      <span class="panel-title">Catalogue</span>
      <div class="filter-bar">
        <input type="search" placeholder="Rechercher…">
        <select>
          <option value="">Toutes variétés</option>
          <option value="aragoke">Aragoke</option>
          <option value="asagi">Asagi</option>
          <option value="benigoi">Benigoi</option>
          <option value="chagoi">Chagoi</option>
          <option value="ginrinshowa">GinrinShowa</option>
          <option value="golden korn">Golden Korn</option>
          <option value="goromo">Goromo</option>
          <option value="goshiki">Goshiki</option>
          <option value="hariwake">Hariwake</option>
          <option value="karashigoi">Karashigoi</option>
          <option value="kikokuryu">Kikokuryu</option>
          <option value="kohaku">Kohaku</option>
          <option value="kujaku">Kujaku</option>
          <option value="kumonryu">Kumonryu</option>
          <option value="matsubakawabate">Matsubakawabate</option>
          <option value="ochiba">Ochiba</option>
          <option value="sanké">Sanké</option>
          <option value="shiroutsuri">ShiroUtsuri</option>
          <option value="showa">Showa</option>
          <option value="soragoi">Soragoi</option>
          <option value="sushui">Sushui</option>
          <option value="tancho">Tancho</option>
          <option value="tanchokohaku">TanchoKohaku</option>
          <option value="utsuri">Utsuri</option>
          <option value="yamabuki">Yamabuki</option>
          <option value="yellow monkey">Yellow Monkey</option>
        </select>
        <select>
          <option value="">Tous statuts</option>
          <option value="dispo">Disponible</option>
          <option value="arrivage">Arrivage</option>
          <option value="rupture">Rupture</option>
          <option value="vendu">Vendu</option>
        </select>
        <div class="spacer"></div>
        <span class="filter-count">19 koïs</span>
        <a href="pages/koi-form.html" class="btn btn--primary btn--sm">＋ Nouveau koï</a>
      </div>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Photo</th><th>Nom / Variété</th><th>Taille</th>
            <th>Prix</th><th>Lignée</th><th>Statut</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><div class="koi-thumb"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16s9-15 20-4C24 17 13 24 2 16z"/><circle cx="12" cy="12" r="2"/></svg></div></td>
            <td><div class="koi-name">Sakura</div><div class="koi-variety">Kohaku</div></td>
            <td>72 cm</td>
            <td class="koi-price">1 800 €</td>
            <td><span class="badge badge-konishi"><img src="../../docs/assets/Logos_konishi-black_1.png" alt="Konishi" class="logo-konishi"></span></td>
            <td><span class="badge badge-dispo">Disponible</span></td>
            <td><div class="row-actions"><button class="btn btn--outline btn--sm">Éditer</button><button class="btn btn--danger btn--sm">Supprimer</button></div></td>
          </tr>
          <tr>
            <td><div class="koi-thumb"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16s9-15 20-4C24 17 13 24 2 16z"/><circle cx="12" cy="12" r="2"/></svg></div></td>
            <td><div class="koi-name">Ryū</div><div class="koi-variety">Showa</div></td>
            <td>65 cm</td>
            <td class="koi-price">2 400 €</td>
            <td><span class="badge badge-konishi"><img src="../../docs/assets/Logos_konishi-black_1.png" alt="Konishi" class="logo-konishi"></span></td>
            <td><span class="badge badge-dispo">Disponible</span></td>
            <td><div class="row-actions"><button class="btn btn--outline btn--sm">Éditer</button><button class="btn btn--danger btn--sm">Supprimer</button></div></td>
          </tr>
          <tr>
            <td><div class="koi-thumb"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16s9-15 20-4C24 17 13 24 2 16z"/><circle cx="12" cy="12" r="2"/></svg></div></td>
            <td><div class="koi-name">Taro</div><div class="koi-variety">Tancho</div></td>
            <td>80 cm</td>
            <td class="koi-price">3 200 €</td>
            <td><span class="badge badge-konishi"><img src="../../docs/assets/Logos_konishi-black_1.png" alt="Konishi" class="logo-konishi"></span></td>
            <td><span class="badge badge-vendu">Vendu</span></td>
            <td><div class="row-actions"><button class="btn btn--ghost btn--sm">Voir</button></div></td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</body>
</html>
