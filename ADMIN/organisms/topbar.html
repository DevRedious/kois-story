<!-- 
  TOPBAR ORGANISM — Patterns de référence 
  Note: Ce fichier sert de documentation pour les 3 variantes de topbar.
-->

<!-- Variante 1 : Dashboard (racine — breadcrumb minimal) -->
<header class="topbar">
  <div class="topbar-left">
    <button class="menu-burger" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="burger-icon">
        <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div>
      <div class="topbar-title">Tableau de bord</div>
      <div class="breadcrumb"><span class="current">Admin</span></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-user">
      <div class="topbar-avatar">MG</div>
      Mathilde G.
    </div>
    <div class="topbar-divider"></div>
    <button class="btn-icon logout-btn" aria-label="Déconnexion" title="Déconnexion">
      <img src="../assets/icons/icon-logout.svg" alt="" width="20" height="20">
    </button>
  </div>
</header>
