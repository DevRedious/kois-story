<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template  Admin Layout</title>
  <style>
    @font-face { font-family: 'Playfair Display'; src: url('../../docs/fonts/playfair-display/PlayfairDisplay-Bold.otf'); font-weight: 700; }
    @font-face { font-family: 'Inter'; src: url('../../docs/fonts/inter/Inter-Regular.otf'); font-weight: 400; }
    @font-face { font-family: 'Inter'; src: url('../../docs/fonts/inter/Inter-Medium.otf'); font-weight: 500; }
    @font-face { font-family: 'Inter'; src: url('../../docs/fonts/inter/Inter-SemiBold.otf'); font-weight: 600; }
    @font-face { font-family: 'Inter'; src: url('../../docs/fonts/inter/Inter-Bold.otf'); font-weight: 700; }

    :root {
      --rouge-koi:    #D62828;
      --bleu-profond: #003049;
      --or-konishi:   #E09F3E;
      --gris-pierre:  #6C757D;
      --blanc-perle:  #F8F9FA;
      --sidebar-w:    240px;
      --topbar-h:     60px;
      --font-title:   'Playfair Display', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--blanc-perle); min-height: 100vh; }

    /* ─── LAYOUT TEMPLATE ────────────────────────────────────── */

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bleu-profond);
      display: flex;
      flex-direction: column;
      z-index: 200;
      transition: transform 0.25s ease;
    }

    /* Main */
    .main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Topbar */
    .topbar {
      position: sticky;
      top: 0;
      height: var(--topbar-h);
      background: #fff;
      border-bottom: 1px solid #e5e9ee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 100;
    }

    /* Content slot */
    .content {
      flex: 1;
      padding: 32px;
    }

    /* ─── SIDEBAR INTERNALS ──────────────────────────────────── */
    .sidebar-brand {
      padding: 26px 22px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .brand-title { font-family: var(--font-title); font-size: 1.25rem; font-weight: 700; color: #fff; }
    .brand-sub   { font-size: 0.63rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--or-konishi); margin-top: 3px; }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 14px 0; }
    .nav-section { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.3); padding: 12px 22px 4px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 22px; color: rgba(255,255,255,0.6);
      font-size: 0.875rem; font-weight: 500;
      cursor: pointer; border-left: 3px solid transparent;
      transition: all 0.15s; user-select: none;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-item.active { color: var(--or-konishi); border-left-color: var(--or-konishi); background: rgba(224,159,62,0.1); font-weight: 600; }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-label { flex: 1; }
    .nav-badge { background: var(--rouge-koi); color: #fff; font-size: 0.62rem; font-weight: 700; border-radius: 10px; padding: 2px 7px; }

    .sidebar-footer {
      padding: 16px 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .admin-user { display: flex; align-items: center; gap: 10px; }
    .admin-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--or-konishi); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--bleu-profond); flex-shrink: 0; }
    .admin-name { font-size: 0.8rem; font-weight: 600; color: #fff; }
    .admin-role { font-size: 0.62rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }

    /* ─── TOPBAR INTERNALS ───────────────────────────────────── */
    .topbar-left  { display: flex; align-items: center; gap: 12px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-title { font-family: var(--font-title); font-size: 1.1rem; font-weight: 700; color: var(--bleu-profond); }

    .menu-burger {
      display: none; align-items: center; justify-content: center;
      background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: var(--bleu-profond); padding: 4px;
    }
    .topbar-user { font-size: 0.8rem; color: var(--gris-pierre); display: flex; align-items: center; gap: 6px; }
    .topbar-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--or-konishi); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--bleu-profond); }
    .topbar-divider { width: 1px; height: 20px; background: #e5e9ee; }

    .btn { display:inline-flex; align-items:center; gap:5px; padding:6px 13px; border-radius:6px; font-family:var(--font-body); font-size:0.78rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border:1.5px solid #d0d7de; color: var(--gris-pierre); }

    /* ─── CONTENT PLACEHOLDER ────────────────────────────────── */
    .slot {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,48,73,0.07);
      padding: 48px;
      text-align: center;
      color: var(--gris-pierre);
      border: 2px dashed #d0d7de;
    }
    .slot-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .slot-desc  { font-size: 0.875rem; }

    /* ─── OVERLAY MOBILE ─────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 199;
    }
    .overlay.active { display: block; }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .topbar { padding: 0 16px; }
      .content { padding: 20px 16px; }
      .menu-burger { display: flex !important; }
    }
  </style>
</head>
<body>

<!-- Overlay mobile -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">

  <div class="sidebar-brand">
    <div class="brand-title" style="display: flex; align-items: center; gap: 10px;"><img src="../../docs/assets/LOGO MANU FINI 2.png" alt="" style="height: 28px; width: auto; border-radius: 50%;"> Koi's Story</div>
    <div class="brand-sub">Administration</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Navigation</div>
    <div class="nav-item active">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span><span class="nav-label">Dashboard</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16s9-15 20-4C24 17 13 24 2 16z"></path><circle cx="12" cy="12" r="2"></circle></svg></span><span class="nav-label">Gestion des Koïs</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></span><span class="nav-label">Messages</span>
      <span class="nav-badge">3</span>
    </div>
    <div class="nav-section" style="margin-top:6px;">Site</div>
    <div class="nav-item" style="opacity:0.5;">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></span><span class="nav-label">Voir le site</span>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="admin-user">
      <div class="admin-avatar">MG</div>
      <div>
        <div class="admin-name">Mathilde G.</div>
        <div class="admin-role">Administratrice</div>
      </div>
    </div>
  </div>

</aside>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-burger" onclick="toggleSidebar()" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
      <span class="topbar-title">Dashboard</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar">MG</div>
        <span>Mathilde G.</span>
      </div>
      <div class="topbar-divider"></div>
      <button class="btn btn-outline">Déconnexion</button>
    </div>
  </header>

  <!-- Content slot -->
  <div class="content">
    <div class="slot">
      <div class="slot-label">Zone de contenu</div>
      <div class="slot-desc">
        Ici s'insère l'organisme correspondant à la page active<br>
        (dashboard stats, kois-table, messages-table…)
      </div>
    </div>
  </div>

</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
  }
</script>

</body>
</html>
