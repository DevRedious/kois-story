<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Filter Bar</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
</head>
<body>

  <h3>Filter Bar — Catalogue Koïs</h3>
  <div class="filter-bar">
    <input type="search" class="filter-search" placeholder="Rechercher…" aria-label="Rechercher dans le catalogue koïs">
    <select aria-label="Filtrer par variété">
      <option value="">Toutes variétés</option>
      <option>Kohaku</option><option>Showa</option><option>Kujaku</option><option>Tancho</option>
    </select>
    <select aria-label="Filtrer par statut catalogue">
      <option value="">Tous statuts</option>
      <option>Disponible</option><option>Vendu</option>
    </select>
    <select aria-label="Filtrer par lignée">
      <option value="">Toutes lignées</option>
      <option>Konishi</option><option>Standard</option>
    </select>
    <div class="filter-spacer"></div>
    <span class="filter-count">12 koïs</span>
    <button type="button" class="btn btn--primary btn--sm">＋ Nouveau koï</button>
  </div>

  <h3 class="demo-title-spaced">Filter Bar — Messages</h3>
  <div class="filter-bar">
    <select aria-label="Filtrer les messages">
      <option value="">Tous messages</option>
      <option>Non lus</option><option>Lus</option>
    </select>
    <div class="filter-spacer"></div>
    <span class="filter-count">3 non lus</span>
    <button type="button" class="btn btn--outline btn--sm">Tout marquer comme lu</button>
  </div>

</body>
</html>
