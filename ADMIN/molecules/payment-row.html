<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Payment Row</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
</head>
<body>

  <h3>Lignes de paiement</h3>
  <table>
    <thead>
      <tr>
        <th>Commande</th><th>Client</th><th>Type</th>
        <th>Montant</th><th>Statut</th><th>Date</th><th>Échéance</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>

      <!-- ── PAYMENT ROW (complet / payé) ─────────────────── -->
      <tr>
        <td><a href="order-form.html" class="link-order-ref">#041</a></td>
        <td>Gérard Dupont</td>
        <td><span class="badge badge-konishi badge--compact">Complet</span></td>
        <td><span class="amount paid">1 120,00 €</span></td>
        <td><span class="badge badge-paid">Payé</span></td>
        <td class="td-fs-08">11/03/2026</td>
        <td class="td-date-muted">—</td>
        <td><button type="button" class="btn btn--ghost btn--sm">Voir</button></td>
      </tr>

      <!-- ── PAYMENT ROW (acompte / partiel) ──────────────── -->
      <tr>
        <td><a href="order-form.html" class="link-order-ref">#042</a></td>
        <td>Thomas Lefèvre</td>
        <td><span class="badge badge-arrivage badge--compact">Acompte</span></td>
        <td><span class="amount partial">200,00 €</span><span class="amount-secondary"> / 850,00 €</span></td>
        <td><span class="badge badge-partial">Partiel</span></td>
        <td class="td-fs-08">12/03/2026</td>
        <td class="td-date-alert">30/03/2026</td>
        <td>
          <div class="td-actions">
            <button type="button" class="btn btn--success btn--sm">Solder</button>
            <button type="button" class="btn btn--ghost btn--sm">Voir</button>
          </div>
        </td>
      </tr>

      <!-- ── PAYMENT ROW (échelonné / en attente) ──────────── -->
      <tr>
        <td><a href="order-form.html" class="link-order-ref">#039</a></td>
        <td>Camille Rousseau</td>
        <td><span class="badge badge-vendu badge--compact">Échelonné</span></td>
        <td><span class="amount pending">600,00 €</span></td>
        <td><span class="badge badge-pending">En attente</span></td>
        <td class="td-date-muted">—</td>
        <td class="td-date-alert">15/03/2026</td>
        <td>
          <div class="td-actions">
            <button type="button" class="btn btn--success btn--sm">Saisir</button>
            <button type="button" class="btn btn--ghost btn--sm">Voir</button>
          </div>
        </td>
      </tr>

    </tbody>
  </table>

</body>
</html>
