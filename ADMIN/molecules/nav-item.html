<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule — Nav Item</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    body { font-family: var(--font-body); background: var(--rouge-sombre); padding: 32px; }
    h3   { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); margin-bottom: 8px; margin-top: 24px; }
    .nav-group { width: 240px; }

    /* ── NAV-ITEM MOLECULE ───────────────────────────────────── */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; color: rgba(255,255,255,0.6);
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      border-left: 3px solid transparent; border-radius: 0 6px 6px 0;
      transition: all 0.15s; user-select: none; text-decoration: none;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-item.active {
      color: var(--blanc-pur);
      border-left-color: var(--blanc-pur);
      background: rgba(255,255,255,0.12);
      font-weight: 600;
    }
    .nav-item.disabled { opacity: 0.35; cursor: not-allowed; }

    .nav-icon  { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-label { flex: 1; }
    .nav-badge { background: var(--rouge-vif); color: #fff; font-size: 0.65rem; font-weight: 700; border-radius: 10px; padding: 2px 7px; line-height: 1.2; }
    .nav-section { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.3); padding: 14px 20px 4px; }
  </style>
</head>
<body>

  <div class="nav-group">

    <div class="nav-section">Navigation</div>

    <div class="nav-item active">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="nav-label">Dashboard</span>
    </div>

    <div class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16s9-15 20-4C24 17 13 24 2 16z"/><circle cx="12" cy="12" r="2"/></svg></span>
      <span class="nav-label">Gestion des Koïs</span>
    </div>

    <div class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
      <span class="nav-label">Messages</span>
      <span class="nav-badge">3</span>
    </div>

    <div class="nav-section" style="margin-top:8px;">Site</div>

    <div class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
      <span class="nav-label">Voir le site</span>
    </div>

    <div class="nav-item disabled">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
      <span class="nav-label">Paramètres</span>
    </div>

  </div>

</body>
</html>
