<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Molecule — Product Row</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
</head>
<body>

  <h3>Lignes produits</h3>
  <table>
    <thead>
      <tr>
        <th>Produit</th><th>Référence</th><th>Catégorie</th>
        <th>Prix</th><th>Stock</th><th>Statut</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>

      <!-- ── PRODUCT ROW (matériel) ────────────────────────── -->
      <tr>
        <td><strong>Filtre Biotec 36</strong></td>
        <td class="td-ref-muted">—</td>
        <td><span class="badge badge-materiel">Matériel</span></td>
        <td>480,00 €</td>
        <td>4</td>
        <td><span class="badge badge-dispo">Actif</span></td>
        <td>
          <div class="td-actions">
            <a href="product-form.html" class="btn btn--outline btn--sm">Éditer</a>
            <button class="btn btn--ghost btn--sm">Stock</button>
          </div>
        </td>
      </tr>

      <!-- ── PRODUCT ROW (nourriture / stock bas) ──────────── -->
      <tr>
        <td><strong>Nourriture Konishi Flottant 5kg</strong></td>
        <td class="td-ref-muted">—</td>
        <td><span class="badge badge-nourriture">Nourriture</span></td>
        <td>68,00 €</td>
        <td class="stock-low">1 ⚠</td>
        <td><span class="badge badge-dispo">Actif</span></td>
        <td>
          <div class="td-actions">
            <a href="product-form.html" class="btn btn--outline btn--sm">Éditer</a>
            <button class="btn btn--primary btn--sm">Réappro</button>
          </div>
        </td>
      </tr>

      <!-- ── PRODUCT ROW (soins / inactif) ─────────────────── -->
      <tr>
        <td><strong>Microscope 40× Koï</strong></td>
        <td class="td-ref-muted">—</td>
        <td><span class="badge badge-soins">Soins</span></td>
        <td>220,00 €</td>
        <td class="u-text-muted">0</td>
        <td><span class="badge badge-vendu">Inactif</span></td>
        <td>
          <div class="td-actions">
            <a href="product-form.html" class="btn btn--outline btn--sm">Éditer</a>
          </div>
        </td>
      </tr>

    </tbody>
  </table>

</body>
</html>
