<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom — Button</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
  <link rel="stylesheet" href="../assets/css/atoms/button-preview.css">
</head>
<body>

  <h3>Variant — Normal</h3>
  <div class="demo-group">
    <button type="button" class="btn btn--primary">＋ Nouveau koï</button>
    <button type="button" class="btn btn--dark">Éditer</button>
    <button type="button" class="btn btn--outline">Annuler</button>
    <button type="button" class="btn btn--danger">Supprimer</button>
    <button type="button" class="btn btn--ghost">Voir le site</button>
  </div>

  <h3>Variant — Small (btn--sm)</h3>
  <div class="demo-group">
    <button type="button" class="btn btn--primary btn--sm">＋ Ajouter</button>
    <button type="button" class="btn btn--dark btn--sm">Éditer</button>
    <button type="button" class="btn btn--outline btn--sm">Voir</button>
    <button type="button" class="btn btn--danger btn--sm">Supprimer</button>
  </div>

  <h3>Variant — Large (btn--lg)</h3>
  <div class="demo-group">
    <button type="button" class="btn btn--primary btn--lg">Contacter via WhatsApp</button>
    <button type="button" class="btn btn--dark btn--lg">Voir le catalogue</button>
  </div>

  <h3>Disabled</h3>
  <div class="demo-group">
    <button type="button" class="btn btn--primary" disabled>Indisponible</button>
    <button type="button" class="btn btn--dark" disabled>Désactivé</button>
  </div>

</body>
</html>
