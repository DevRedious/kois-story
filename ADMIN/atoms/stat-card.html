<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom — Stat Card</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
  <link rel="stylesheet" href="../assets/css/atoms/stat-card-preview.css">
</head>
<body>

  <h3>Stat Cards</h3>
  <div class="admin-preview-grid">

    <div class="stat-card dispo">
      <div class="stat-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 16s9-15 20-4C24 17 13 24 2 16z"/><circle cx="12" cy="12" r="2"/></svg></div>
      <div class="stat-label">Koïs disponibles</div>
      <div class="stat-value">12</div>
      <div class="stat-sub up">↑ 3 ajoutés ce mois</div>
    </div>

    <div class="stat-card vendu">
      <div class="stat-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <div class="stat-label">Koïs vendus</div>
      <div class="stat-value">7</div>
      <div class="stat-sub">Depuis l'ouverture</div>
    </div>

    <div class="stat-card messages">
      <div class="stat-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
      <div class="stat-label">Messages non lus</div>
      <div class="stat-value">3</div>
      <div class="stat-sub down">2 reçus aujourd'hui</div>
    </div>

    <div class="stat-card konishi">
      <div class="stat-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div class="stat-label">Lignée <img src="../../docs/assets/Logos_konishi-black_1.png" alt="Konishi" class="logo-konishi"></div>
      <div class="stat-value">8</div>
      <div class="stat-sub">Spécimens certifiés</div>
    </div>

  </div>

</body>
</html>
