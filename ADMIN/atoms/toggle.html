<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Atom — Toggle</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/preview-shell.css">
  <link rel="stylesheet" href="../assets/css/atoms/toggle.css">
</head>
<body>

  <h3>Actif / Inactif</h3>
  <div class="demo-group demo-group--gap-20">
    <label class="toggle-wrap">
      <input type="checkbox" class="toggle-input" checked>
      <span class="toggle-track"></span>
      <span class="toggle-label">Disponible</span>
    </label>
    <label class="toggle-wrap">
      <input type="checkbox" class="toggle-input">
      <span class="toggle-track"></span>
      <span class="toggle-label">Inactif</span>
    </label>
  </div>

  <h3>Dormant V2 (désactivé)</h3>
  <div class="demo-group demo-group--gap-20">
    <label class="toggle-wrap">
      <input type="checkbox" class="toggle-input" disabled>
      <span class="toggle-track"></span>
      <span class="toggle-label dormant-label">Inscription client — V2</span>
    </label>
    <label class="toggle-wrap">
      <input type="checkbox" class="toggle-input" disabled>
      <span class="toggle-track"></span>
      <span class="toggle-label dormant-label">Paiement en ligne — V2</span>
    </label>
  </div>

</body>
</html>
