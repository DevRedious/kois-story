name: Mise à jour du CHANGELOG

on:
  push:
    branches:
      - DEV

jobs:
  changelog:
    name: Générer le CHANGELOG
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Générer le CHANGELOG avec git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commiter le CHANGELOG mis à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: mise à jour automatique du CHANGELOG [skip ci]"
          git push
