name: Update CHANGELOG

on:
  push:
    branches:
      - dev
      - DEV
      - main
  workflow_dispatch:

jobs:
  changelog:
    name: Generate CHANGELOG
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate CHANGELOG
        run: git-cliff --config cliff.toml --verbose --output CHANGELOG.md

      - name: Create Pull Request for CHANGELOG update
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: auto-update CHANGELOG [skip ci]"
          branch: chore/auto-update-changelog
          delete-branch: true
          title: "docs: auto-update CHANGELOG"
          body: |
            Automated CHANGELOG update generated by git-cliff.
          base: ${{ github.ref_name }}
