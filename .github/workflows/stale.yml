name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 8:00 UTC

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has had no activity for 14 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          stale-pr-message: >
            This pull request has had no activity for 14 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen it if it is still relevant.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen it if it is still relevant.
          days-before-stale: 14
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
