name: Feature request
description: Propose an improvement for the project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the user or product problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected change.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Specify affected pages, features, or roles.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the expected result in concrete terms.
